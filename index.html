<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Quản lý lịch bay</title>
    <style>
        :root {
            --primary: #f2d27e;
            --border: #ccc;
            --bg: #f4f4f9;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 15px; background-color: var(--bg); }
        h2 { text-align: center; color: #333; font-size: 1.2rem; margin-bottom: 10px; }

        /* Toolbar Buttons */
        .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #eee; border: 1px solid #ccc; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn:hover { background: #ddd; }
        .btn-primary { background: #2196F3; color: white; border-color: #1976D2; }
        .btn-primary:hover { background: #1976D2; }
        .btn-danger { background: #f44336; color: white; border-color: #d32f2f; }
        .btn-danger:hover { background: #d32f2f; }
        .btn-success { background: #4CAF50; color: white; border-color: #388E3C; }
        .btn-success:hover { background: #388E3C; }
        .btn-add-flight { background: #ff9800; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-add-flight:hover { background: #f57c00; }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-input-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }

        /* Table Container */
        .table-container { overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 5px; }
        table { width: 100%; border-collapse: collapse; min-width: 750px; font-size: 13px; }
        th, td { border: 1px solid var(--border); padding: 8px 4px; text-align: center; vertical-align: middle; }
        th { background-color: var(--primary); color: #333; }
        
        /* Inputs and Selects */
        input, select { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 13px; background: white; }
        select { cursor: pointer; }
        .action-cell { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .btn-remove-row { background: #ffebee; border: 1px solid #ef9a9a; color: #c62828; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-remove-row:hover { background: #ffcdd2; }

        /* Status Colors */
        .status-green { background-color: #a5d6a7 !important; color: #1b5e20; font-weight: bold; }
        .status-yellow { background-color: #fff59d !important; color: #f57f17; font-weight: bold; }
        .status-red { background-color: #ef9a9a !important; color: #b71c1c; font-weight: bold; }

        /* Tooltip for overflow */
        .cell-content { max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: relative; display: inline-block; width: 100%; }
        .cell-content:hover { overflow: visible; background: white; z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.2); padding: 4px; border-radius: 4px; white-space: normal; word-break: break-all; position: absolute; top: -5px; left: 0; width: auto; max-width: 250px; }
        td { position: relative; } /* Để tooltip absolute đúng vị trí */

        .add-flight-row { margin-top: 10px; display: flex; gap: 10px; align-items: center; background: #fafafa; padding: 8px; border-radius: 5px; border: 1px dashed #ccc; }
        
        @media (max-width: 600px) { 
            .toolbar { justify-content: center; } 
            .btn { font-size: 12px; padding: 6px 10px; }
            table { font-size: 11px; min-width: 650px; }
            th, td { padding: 5px 2px; }
            input, select { font-size: 11px; padding: 4px; }
        }
    </style>
</head>
<body>

    <h2>QUẢN LÝ LỊCH BAY NHÂN SỰ</h2>

    <!-- Thanh công cụ -->
    <div class="toolbar">
        <button class="btn btn-success" onclick="addNewRow()">➕ Thêm</button>
        <button class="btn btn-danger" onclick="deleteSelectedRow()">🗑️ Xóa</button>
        <button class="btn btn-primary" onclick="saveToJSON()">💾 Lưu File</button>
        <div class="file-input-wrapper">
            <button class="btn btn-primary" style="background:#ff9800; border-color:#f57c00;">📂 Tải lên</button>
            <input type="file" id="fileInput" accept=".json" onchange="loadFromJSON(event)">
        </div>
    </div>

    <!-- Bảng dữ liệu -->
    <div class="table-container">
        <table id="scheduleTable">
            <thead>
                <tr>
                    <th style="width: 40px;">STT</th>
                    <th style="min-width: 100px;">Họ và tên</th>
                    <th style="width: 80px;">Bài bay</th>
                    <th style="width: 80px;">Giãn cách</th>
                    <th style="width: 130px;">Chuyến gần nhất</th>
                    <th style="width: 130px;">Chuyến tiếp theo</th>
                    <th style="width: 120px;">Hôm nay (+-)</th>
                    <th style="width: 130px;">Ngày kiểm tra</th>
                    <th style="width: 120px;">Ngày k.tra (+-)</th>
                    <th style="width: 60px;">Hành động</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Dữ liệu sẽ được render vào đây -->
            </tbody>
        </table>
    </div>

    <!-- Quản lý danh sách Bài bay -->
    <div class="add-flight-row">
        <span style="font-weight: bold; white-space: nowrap;">Danh sách Bài bay:</span>
        <select id="flightListSelect" style="width: 80px; text-align: center;">
            <!-- Options tự động render bằng JS -->
        </select>
        <input type="number" id="newFlightInput" placeholder="Nhập số mới" min="1" style="width: 100px;">
        <button class="btn-add-flight" onclick="addNewFlightOption()">+ Thêm số</button>
    </div>

    <script>
        // --- 1. CẤU HÌNH DỮ LIỆU VÀ BIẾN TOÀN CỤC ---
        // Danh sách bài bay mặc định (1 đến 10)
        let flightOptions = Array.from({length: 10}, (_, i) => (i + 1).toString());
        // Dữ liệu nhân sự (Khởi tạo 2 mẫu)
        let employees = [
            { id: 1, name: 'Nguyễn Văn A', flight: '1', gap: 30, lastDate: '2026-05-30' },
            { id: 2, name: 'Trần Thị B', flight: '2', gap: 45, lastDate: '2026-06-15' }
        ];
        let nextId = 3; 

        const tableBody = document.getElementById('tableBody');
        const flightSelect = document.getElementById('flightListSelect');

        // --- 2. CÁC HÀM HỖ TRỢ XỬ LÝ NGÀY (An toàn tránh lỗi Timezone) ---
        function parseDate(dateString) {
            if (!dateString) return null;
            const parts = dateString.split('-');
            return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        }
        function formatToYMD(dateObj) {
            if (!dateObj) return '';
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        function formatDisplay(dateString) {
            if (!dateString) return '';
            const parts = dateString.split('-');
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }
        // Lấy ngày hôm nay thực tế
        function getTodayStr() {
            return formatToYMD(new Date());
        }

        // --- 3. HÀM TÍNH TOÁN LOGIC ---
        function calculateRowData(emp) {
            const todayStr = getTodayStr();
            const todayObj = parseDate(todayStr);
            const lastObj = parseDate(emp.lastDate);
            
            // Tính ngày chuyến tiếp theo
            const nextObj = new Date(lastObj);
            nextObj.setDate(nextObj.getDate() + parseInt(emp.gap));
            const nextStr = formatToYMD(nextObj);

            // Tính cột Hôm nay (+-)
            const diffToday = Math.ceil((nextObj - todayObj) / (1000 * 60 * 60 * 24));
            let todayStatus = diffToday > 0 ? `+ ${diffToday}` : `${diffToday}`;
            let todayClass = diffToday > 10 ? "status-green" : (diffToday > 0 ? "status-yellow" : "status-red");

            // Tính cột Ngày kiểm tra (+-) dựa trên ngày được chọn
            const checkDateStr = emp.checkDate || todayStr;
            const checkObj = parseDate(checkDateStr);
            const diffCheck = Math.ceil((nextObj - checkObj) / (1000 * 60 * 60 * 24));
            
            let checkStatus = emp.checkDate ? (diffCheck > 0 ? `+ ${diffCheck}` : `${diffCheck}`) : '';
            let checkClass = "";
            if(emp.checkDate) {
                checkClass = diffCheck > 10 ? "status-green" : (diffCheck > 0 ? "status-yellow" : "status-red");
            }

            return { nextStr, todayStatus, todayClass, checkStatus, checkClass };
        }

        // --- 4. RENDER BẢNG ---
        function renderTable() {
            tableBody.innerHTML = '';
            
            // Cập nhật danh sách Bài bay vào Select
            flightSelect.innerHTML = '';
            flightOptions.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                flightSelect.appendChild(option);
            });

            employees.forEach((emp, index) => {
                const calc = calculateRowData(emp);
                
                const tr = document.createElement('tr');
                tr.dataset.index = index;
                tr.innerHTML = `
                    <td style="background:#f2d27e; font-weight:bold;">${emp.id}</td>
                    <td><input type="text" class="editable" data-field="name" value="${emp.name}" style="min-width:80px;"></td>
                    <td>
                        <select class="editable" data-field="flight" style="min-width:60px;">
                            ${flightOptions.map(opt => `<option value="${opt}" ${opt === emp.flight ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </td>
                    <td><input type="number" class="editable" data-field="gap" value="${emp.gap}" style="width:50px;"></td>
                    <td><input type="date" class="editable" data-field="lastDate" value="${emp.lastDate}"></td>
                    <td style="background:#e8f5e9; font-weight:bold;">
                        <div class="cell-content">${formatDisplay(calc.nextStr)}</div>
                    </td>
                    <td class="${calc.todayClass}">
                        <div class="cell-content">${calc.todayStatus}</div>
                    </td>
                    <td><input type="date" class="editable check-date" data-field="checkDate" value="${emp.checkDate || ''}" placeholder="Chọn ngày"></td>
                    <td class="${calc.checkClass}">
                        <div class="cell-content">${calc.checkStatus}</div>
                    </td>
                    <td><button class="btn-remove-row" onclick="deleteSelectedRow()">Xóa</button></td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // --- 5. XỬ LÝ SỰ KIỆN NHẬP LIỆU VÀ NÚT BẤM ---
        
        // Lưu dữ liệu khi người dùng thay đổi ô Input/Select
        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('editable')) {
                const tr = e.target.closest('tr');
                if(!tr) return;
                const index = tr.dataset.index;
                const field = e.target.dataset.field;
                employees[index][field] = e.target.value;
                
                // Reset ngày kiểm tra nếu thay đổi chuyến gần nhất
                if(field === 'lastDate') {
                    employees[index].checkDate = '';
                }
                renderTable();
            }
        });

        // Thêm dòng mới
        function addNewRow() {
            const todayStr = getTodayStr();
            employees.push({
                id: nextId++,
                name: 'Nhân sự mới',
                flight: flightOptions[0] || '1',
                gap: 30,
                lastDate: todayStr
            });
            renderTable();
            // Cuộn xuống dưới cùng (hữu ích trên mobile)
            document.querySelector('.table-container').scrollLeft = 9999;
        }

        // Xóa dòng đang chọn (Xóa dòng cuối cùng nếu chưa chọn dòng nào để tránh lỗi)
        function deleteSelectedRow() {
            if(employees.length <= 1) {
                alert("Cần ít nhất 1 nhân sự!");
                return;
            }
            // Lấy dòng đang được focus hoặc dòng cuối
            const activeInput = document.activeElement;
            let rowToDelete = -1;
            if(activeInput && activeInput.closest('tr')) {
                rowToDelete = parseInt(activeInput.closest('tr').dataset.index);
            }
            
            if(rowToDelete === -1 || isNaN(rowToDelete)) {
                // Nếu không tìm thấy, xóa dòng cuối (hành động an toàn)
                if(confirm("Bạn chưa chọn dòng nào. Có muốn xóa dòng cuối cùng không?")) {
                    employees.pop();
                } else { return; }
            } else {
                if(confirm("Bạn có chắc muốn xóa nhân sự này?")) {
                    employees.splice(rowToDelete, 1);
                } else { return; }
            }
            renderTable();
        }

        // --- 6. QUẢN LÝ BÀI BAY ---
        function addNewFlightOption() {
            const input = document.getElementById('newFlightInput');
            const val = input.value.trim();
            if(!val) { alert("Vui lòng nhập số bài bay!"); return; }
            if(flightOptions.includes(val)) { alert("Số này đã tồn tại!"); return; }
            flightOptions.push(val);
            flightOptions.sort((a,b) => parseInt(a) - parseInt(b)); // Sắp xếp tăng dần
            input.value = '';
            renderTable(); // Cập nhật lại danh sách select trong bảng
        }

        // --- 7. LƯU TRỮ (JSON DI ĐỘNG) ---
        function saveToJSON() {
            // Đồng bộ dữ liệu từ bảng trước khi lưu (đề phòng người dùng chưa blur khỏi ô input)
            document.querySelectorAll('.editable').forEach(input => {
                if(input.closest('tr')) {
                    const index = input.closest('tr').dataset.index;
                    const field = input.dataset.field;
                    if(index !== undefined) employees[index][field] = input.value;
                }
            });

            const data = {
                flightOptions: flightOptions,
                employees: employees,
                nextId: nextId
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `lich_bay_${getTodayStr()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function loadFromJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(data.flightOptions) flightOptions = data.flightOptions;
                    if(data.employees) employees = data.employees;
                    if(data.nextId) nextId = data.nextId;
                    renderTable();
                    alert("Tải dữ liệu lên thành công!");
                } catch (err) {
                    alert("Lỗi định dạng file. Vui lòng kiểm tra lại!");
                }
            };
            reader.readAsText(file);
            // Reset input file để có thể chọn lại file giống tên nếu cần
            event.target.value = '';
        }

        // Khởi chạy ứng dụng
        renderTable();
    </script>
</body>
</html>
